services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mapbox-vision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapbox_vision}
      POSTGRES_USER: ${POSTGRES_USER:-mapbox_vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mapbox_vision}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mapbox_vision} -d ${POSTGRES_DB:-mapbox_vision}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
