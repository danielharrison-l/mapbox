services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: mapbox-vision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mapbox_vision}
      POSTGRES_USER: ${POSTGRES_USER:-mapbox_vision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mapbox_vision}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mapbox_vision} -d ${POSTGRES_DB:-mapbox_vision}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    container_name: mapbox-vision-api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173,http://localhost:5174}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mapbox_vision}:${POSTGRES_PASSWORD:-mapbox_vision}@postgres:5432/${POSTGRES_DB:-mapbox_vision}?schema=public
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
             pnpm config set store-dir /pnpm/store &&
             pnpm install --frozen-lockfile &&
             pnpm dev:api"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${API_PORT:-3000}/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: node:22-alpine
    container_name: mapbox-vision-web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    environment:
      - WEB_PORT=${WEB_PORT:-5173}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:3000}
      - VITE_MAPBOX_ACCESS_TOKEN
      - VITE_3D_MODEL_URL=${VITE_3D_MODEL_URL:-/models/tower.glb}
    ports:
      - "${WEB_PORT:-5173}:${WEB_PORT:-5173}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
             pnpm config set store-dir /pnpm/store &&
             pnpm install --frozen-lockfile &&
             pnpm dev:web"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${WEB_PORT:-5173}/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
  pnpm_store:
